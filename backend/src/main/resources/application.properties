# ─────────────────────────────────────────────
# College ERP — Spring Boot Configuration
# ─────────────────────────────────────────────

# Server
server.port=8080

# ── Database (H2 In-Memory) ──────────
spring.datasource.url=jdbc:h2:mem:college_erp;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Initialize schema
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────
jwt.secret=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
jwt.expiration-ms=86400000

# ── File Upload (for student docs) ────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Logging ───────────────────────────────────
logging.level.com.erp=INFO
logging.level.org.springframework.security=WARN
